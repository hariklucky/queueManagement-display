name: Build Kylin ARM64 Linux

on:
  workflow_dispatch:

jobs:
  build-arm64-linux:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl pkg-config libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            patchelf libfuse2 \
            dpkg-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      # 先打 AppImage（自带 WebKit），再 repack glibc 并封装 deb，适配 glibc 2.31 + WebKit 4.0 麒麟终端。
      - name: Build arm64 Kylin packages
        env:
          KYLIN_DEB_FROM_APPIMAGE: "1"
          KYLIN_APPIMAGE_GLIBC_COMPAT: "1"
        run: npm run tauri:build:kylin:deb:arm64

      - name: Verify Kylin compatibility
        run: |
          deb_file="$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f | head -n 1)"
          appimage_file="$(find src-tauri/target -name "*.AppImage" -type f | head -n 1)"
          if [ -z "$deb_file" ]; then
            echo "错误：未找到 deb 安装包"
            ls -laR src-tauri/target/release/bundle/ || true
            exit 1
          fi
          if [ -z "$appimage_file" ]; then
            echo "错误：未找到 AppImage"
            ls -laR src-tauri/target/release/bundle/ || true
            exit 1
          fi
          chmod +x scripts/verify-deb-kylin-compat.sh scripts/verify-appimage-glibc.sh
          bash scripts/verify-deb-kylin-compat.sh "$deb_file"
          bash scripts/verify-appimage-glibc.sh "$appimage_file"
          echo "deb 压缩格式:"
          ar t "$deb_file"

      - name: Prepare artifacts
        run: |
          deb_file="$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f | head -n 1)"
          appimage_file="$(find src-tauri/target -name "*.AppImage" -type f | head -n 1)"
          mkdir -p artifact
          cp "$deb_file" artifact/
          cp "$appimage_file" artifact/
          chmod +x artifact/*
          ls -la artifact/

      - name: Upload Kylin packages
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-packages
          path: artifact/
          retention-days: 30
          if-no-files-found: error
