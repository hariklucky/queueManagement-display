name: Build Kylin ARM64 Linux

on:
  workflow_dispatch:

jobs:
  build-arm64-linux:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl pkg-config libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            patchelf libfuse2 \
            dpkg-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      # AppImage 自带 WebKit 等库，适合仅有 WebKit 4.0 的麒麟终端
      - name: Build arm64 AppImage
        run: npm run tauri:build:kylin:appimage:arm64

      - name: Verify and prepare AppImage artifact
        run: |
          echo "=== 查找 AppImage 文件 ==="
          find src-tauri/target -name "*.AppImage" -type f -print
          appimage_file="$(find src-tauri/target -name "*.AppImage" -type f | head -n 1)"
          if [ -z "$appimage_file" ]; then
            echo "错误：未找到 AppImage"
            ls -laR src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "找到 AppImage: $appimage_file"
          mkdir -p artifact
          cp "$appimage_file" artifact/
          chmod +x artifact/*
          ls -la artifact/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-appimage
          path: artifact/
          retention-days: 30
          if-no-files-found: error
