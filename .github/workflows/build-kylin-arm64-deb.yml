name: Build Kylin ARM64 DEB

on:
  workflow_dispatch:

jobs:
  build-arm64-deb:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl pkg-config libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev dpkg-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build arm64 deb
        run: npm run tauri:build:kylin:deb:arm64

      - name: Verify and prepare deb artifact
        run: |
          echo "=== 查找 .deb 文件 ==="
          find src-tauri/target -name "*.deb" -type f -print
          deb_file="$(find src-tauri/target -name "*.deb" -type f | head -n 1)"
          if [ -z "$deb_file" ]; then
            echo "错误：未找到 .deb 安装包"
            ls -laR src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "找到 deb: $deb_file"
          mkdir -p artifact
          cp "$deb_file" artifact/
          ls -la artifact/
          echo "DEB_FILE=artifact/$(basename "$deb_file")" >> "$GITHUB_ENV"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: artifact/
          retention-days: 30
          if-no-files-found: error
